<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>暴力更新 V27</title>
    <style>
        /* 杰哥！如果沒看到紫色背景，就是沒更新成功！ */
        body { 
            background: #4c1d95 !important; 
            color: white; 
            font-family: "Microsoft JhengHei", sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        #game-box {
            background: white;
            color: black;
            width: 90%;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .dice {
            font-size: 80px;
            margin: 20px;
        }
        .btn {
            background: #f59e0b;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover { background: #d97706; }
        .status {
            font-size: 24px;
            margin: 20px;
        }
    </style>
</head>
<body>

    <h1>🚀 杰哥專用：暴力更新 V27</h1>
    <p>如果背景是紫色的，代表我們贏了！</p>

    <div id="game-box">
        <div class="status" id="player-turn">🔴 杰哥的回合</div>
        <div class="dice" id="dice-val">🎲</div>
        <button class="btn" onclick="roll()">擲骰子</button>
        <div class="status" id="result">點擊按鈕開始！</div>
        <div style="margin-top:20px; font-weight:bold;">
            杰哥資產: <span id="money">$15,000</span>
        </div>
    </div>

    <script>
        // 這是最簡單的邏輯，確保一定能動
        let m = 15000;
        function roll() {
            const r = Math.floor(Math.random() * 6) + 1;
            const diceIcon = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
            document.getElementById('dice-val').innerText = diceIcon[r];
            document.getElementById('result').innerText = '你擲出了 ' + r + ' 點！';
            
            m += (r * 100);
            document.getElementById('money').innerText = '$' + m.toLocaleString();
            
            // 震動效果
            document.getElementById('game-box').style.transform = 'scale(1.05)';
            setTimeout(() => {
                document.getElementById('game-box').style.transform = 'scale(1)';
            }, 100);
        }
    </script>
</body>
</html>
