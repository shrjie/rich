# 定義 HTML 內容
html_v21_content = """<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玩玩大富翁 V21 - GitHub 專用版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0f172a;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            grid-template-rows: repeat(11, 1fr);
            gap: 2px;
            width: 100%;
            height: 100%;
            background-color: #334155;
            border: 4px solid #1e293b;
        }
        .cell {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: bold;
            position: relative;
            color: #1e293b;
        }
        .player-token {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            z-index: 10;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col items-center p-4">

    <header class="mb-8 text-center">
        <h1 class="text-4xl font-black text-white flex items-center justify-center gap-3">
            <i data-lucide="dices" class="text-sky-500 w-10 h-10"></i>
            玩玩大富翁 <span class="text-sky-500">V21</span>
        </h1>
        <p class="text-slate-500 font-mono mt-2 uppercase tracking-widest text-sm">穩定版 | GitHub Pages Ready</p>
    </header>

    <main class="flex flex-col lg:flex-row gap-8 items-start justify-center w-full max-w-6xl">
        
        <div class="relative w-full max-w-[500px] aspect-square bg-slate-800 p-2 rounded-xl shadow-2xl overflow-hidden border-4 border-slate-700">
            <div id="board" class="game-board">
                </div>
        </div>

        <div class="flex flex-col gap-6 w-full max-w-sm">
            
            <div id="p1-card" class="bg-slate-800 p-5 rounded-2xl border-l-8 border-red-500 shadow-lg transition-all duration-300">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <i data-lucide="user" class="text-red-500"></i>
                        <span class="text-xl font-bold">杰哥 (P1)</span>
                    </div>
                    <span id="p1-money" class="text-2xl font-black text-yellow-400 font-mono">$15,000</span>
                </div>
            </div>

            <div id="p2-card" class="bg-slate-800 p-5 rounded-2xl border-l-8 border-blue-500 shadow-lg transition-all duration-300 opacity-50">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <i data-lucide="user" class="text-blue-500"></i>
                        <span class="text-xl font-bold">阿強 (P2)</span>
                    </div>
                    <span id="p2-money" class="text-2xl font-black text-yellow-400 font-mono">$15,000</span>
                </div>
            </div>

            <div class="bg-slate-800 p-8 rounded-3xl text-center border border-slate-700 shadow-2xl">
                <div id="turn-text" class="text-xs font-bold text-slate-500 mb-4 uppercase tracking-widest">目前輪到</div>
                <div class="flex flex-col items-center gap-6">
                    <div id="dice-display" class="w-20 h-20 bg-slate-100 rounded-2xl flex items-center justify-center text-4xl font-black text-slate-900 shadow-inner">?</div>
                    <button id="roll-btn" class="w-full py-4 bg-sky-600 hover:bg-sky-500 text-white rounded-xl font-black text-xl transition-all active:scale-95">
                        開始擲骰子
                    </button>
                </div>
            </div>

            <div class="bg-black/30 p-4 rounded-xl border border-slate-800 h-32 overflow-hidden text-[10px] font-mono text-slate-500">
                <div class="font-bold text-slate-400 mb-2 border-b border-slate-800 pb-1 uppercase tracking-tighter">近期紀錄</div>
                <div id="log-container">
                    <div>> 系統初始化完成</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const BOARD_SIZE = 11;
        const PATH = [];
        // 生成路徑 (順時針外圈)
        for (let i = 0; i < 11; i++) PATH.push(i);
        for (let i = 1; i < 11; i++) PATH.push((i + 1) * 11 - 1);
        for (let i = 9; i >= 0; i--) PATH.push(10 * 11 + i);
        for (let i = 9; i >= 1; i--) PATH.push(i * 11);

        const players = [
            { id: 1, name: '杰哥', pos: 0, money: 15000, color: '#ef4444' },
            { id: 2, name: '阿強', pos: 0, money: 15000, color: '#3b82f6' }
        ];
        let turn = 0;

        // 初始化棋盤
        const boardEl = document.getElementById('board');
        for (let i = 0; i < 121; i++) {
            const cell = document.createElement('div');
            const row = Math.floor(i / 11);
            const col = i % 11;
            const isEdge = row === 0 || row === 10 || col === 0 || col === 10;
            
            cell.className = isEdge ? 'cell' : 'bg-transparent border-none';
            if (isEdge) {
                if (i === 0) {
                    cell.innerHTML = '<span class="text-red-500 font-black">GO</span>';
                    cell.style.backgroundColor = '#fef08a';
                } else {
                    cell.innerText = i;
                }
            }
            cell.id = `cell-${i}`;
            boardEl.appendChild(cell);
        }

        function addLog(msg) {
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.innerText = `> ${msg}`;
            container.prepend(div);
            if (container.childNodes.length > 6) container.lastChild.remove();
        }

        function playSfx(f) {
            const a = new (window.AudioContext || window.webkitAudioContext)();
            const o = a.createOscillator();
            const g = a.createGain();
            o.connect(g); g.connect(a.destination);
            o.frequency.value = f;
            g.gain.exponentialRampToValueAtTime(0.01, a.currentTime + 0.2);
            o.start(); o.stop(a.currentTime + 0.2);
        }

        function updateUI() {
            document.querySelectorAll('.player-token').forEach(t => t.remove());
            players.forEach((p, idx) => {
                const cell = document.getElementById(`cell-${p.pos}`);
                const t = document.createElement('div');
                t.className = 'player-token';
                t.style.backgroundColor = p.color;
                t.style.left = (idx * 5) + 'px';
                t.style.top = (idx * 5) + 'px';
                cell.appendChild(t);
                document.getElementById(`p${p.id}-money`).innerText = `$${p.money.toLocaleString()}`;
            });
            document.getElementById('p1-card').style.opacity = turn === 0 ? '1' : '0.5';
            document.getElementById('p2-card').style.opacity = turn === 1 ? '1' : '0.5';
            document.getElementById('p1-card').style.transform = turn === 0 ? 'scale(1.05)' : 'scale(1)';
            document.getElementById('p2-card').style.transform = turn === 1 ? 'scale(1.05)' : 'scale(1)';
        }

        document.getElementById('roll-btn').addEventListener('click', () => {
            const btn = document.getElementById('roll-btn');
            const disp = document.getElementById('dice-display');
            btn.disabled = true;
            playSfx(440);

            let i = 0;
            const timer = setInterval(() => {
                disp.innerText = Math.floor(Math.random() * 6) + 1;
                if (++i > 10) {
                    clearInterval(timer);
                    const r = Math.floor(Math.random() * 6) + 1;
                    disp.innerText = r;
                    
                    const p = players[turn];
                    const curIdx = PATH.indexOf(p.pos);
                    const nextIdx = (curIdx + r) % PATH.length;
                    
                    if (nextIdx < curIdx) {
                        p.money += 2000;
                        addLog(`${p.name} 經過起點，領取 $2,000`);
                    }
                    p.pos = PATH[nextIdx];
                    addLog(`${p.name} 擲出 ${r} 點`);
                    
                    turn = (turn + 1) % 2;
                    updateUI();
                    btn.disabled = false;
                }
            }, 60);
        });

        updateUI();
    </script>
</body>
</html>"""

# 將內容寫入檔案
with open("index.html", "w", encoding="utf-8") as f:
    f.write(html_v21_content)
